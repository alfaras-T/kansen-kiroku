name: Register Apple Device

# iPad/スマホから実行し、Appleデバイス登録用のURL/QRコードを
# ログに出力させるためのワークフロー。
# 出力されたURLをブラウザで開くと、実行した端末自身が登録される。

on:
  workflow_dispatch:

jobs:
  register-device:
    name: Generate device registration link
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存パッケージをインストール
        run: npm install

      - name: EAS CLIをセットアップ
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: expectをインストール
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: デバイス登録リンクを生成
        run: |
          expect -c '
            set timeout 30
            spawn eas device:create
            expect {
              -re "Website" { send "\r"; exp_continue }
              -re "registration" { send "\r"; exp_continue }
              -re "name" { send "\r"; exp_continue }
              -re "\\(Y/n\\)" { send "\r"; exp_continue }
              -re "https://" { }
              timeout { puts "TIMEOUT_REACHED" }
              eof { }
            }
            sleep 3
          '
        shell: bash
